name: Semgrep Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Her Pazartesi 08:00

jobs:
  semgrep:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep (OWASP Top 10)
        run: |
          semgrep ci \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --config p/nodejs \
            --json --output semgrep-results.json \
            --sarif --sarif-output semgrep-results.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: |
            semgrep-results.json
            semgrep-results.sarif

      - name: Check for High Severity
        if: always()
        run: |
          HIGH_COUNT=$(cat semgrep-results.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          results = data.get('results', [])
          high = [r for r in results if r.get('extra', {}).get('severity', '') in ['ERROR', 'WARNING']]
          print(len(high))
          ")
          echo "Yüksek/Kritik bulgu sayısı: $HIGH_COUNT"
          if [ "$HIGH_COUNT" -gt "0" ]; then
            echo "::warning::$HIGH_COUNT adet yüksek seviye güvenlik bulgusu tespit edildi!"
          fi
